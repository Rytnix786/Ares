name: Ares Security Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  python-security:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install security scanners
        run: python -m pip install bandit pip-audit detect-secrets
      - name: Bandit static analysis
        run: bandit -q -r ares scripts -x tests
      - name: Dependency vulnerability audit
        run: pip-audit --strict
      - name: Secret scan
        run: detect-secrets scan --all-files --force-use-all-plugins --exclude-files '(^\.git/|^reports/|^docs/screenshots/)' > reports-detect-secrets.json
      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-gate-artifacts
          path: reports-detect-secrets.json

  image-security:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f Dockerfile -t ares-api:ci .
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ares-api:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
