{{- $pdb := default .Values.api.pdb .Values.pdb -}}
{{- if $pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "ares.fullname" . }}-api
  labels:
    {{- include "ares.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  minAvailable: {{ $pdb.minAvailable }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: api
{{- end }}
