apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ares.fullname" . }}-api
  labels:
    {{- include "ares.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels: {app.kubernetes.io/instance: {{ .Release.Name }}, app.kubernetes.io/component: api}
  template:
    metadata:
      labels:
        {{- include "ares.labels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: {{ toJson .Values.api.command }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
          envFrom:
            - configMapRef: {name: {{ include "ares.fullname" . }}-config}
            - secretRef: {name: {{ include "ares.secretName" . }}}
          readinessProbe:
            httpGet: {path: /health/ready, port: http}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /health/live, port: http}
            initialDelaySeconds: 30
            periodSeconds: 20
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources.api | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ares.fullname" . }}-api
  labels:
    {{- include "ares.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.service.type }}
  selector: {app.kubernetes.io/instance: {{ .Release.Name }}, app.kubernetes.io/component: api}
  ports:
    - name: http
      port: 80
      targetPort: http
