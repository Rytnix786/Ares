apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ares.fullname" . }}-config
  labels:
    {{- include "ares.labels" . | nindent 4 }}
data:
  ENVIRONMENT: {{ .Values.config.environment | quote }}
  MLFLOW_TRACKING_URI: {{ .Values.config.mlflowTrackingUri | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.config.otelExporterOtlpEndpoint | quote }}
  ARES_ALLOWED_ORIGINS: {{ join "," .Values.config.allowedOrigins | quote }}
---
{{- if .Values.secrets.createDemoSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ares.secretName" . }}
  labels:
    {{- include "ares.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  REDIS_URL: {{ .Values.secrets.redisUrl | quote }}
  ARES_API_KEYS: {{ .Values.secrets.apiKeys | quote }}
  API_KEY_HASH_SECRET: {{ .Values.secrets.apiKeyHashSecret | quote }}
{{- end }}
