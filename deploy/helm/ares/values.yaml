image:
  repository: ghcr.io/example/ares-api
  tag: latest
  pullPolicy: IfNotPresent

api:
  replicas: 2
  port: 8000
  command: ["uvicorn", "ares.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 1

dashboard:
  enabled: true
  replicas: 1
  image:
    repository: ghcr.io/example/ares-dashboard
    tag: latest
  port: 8501
  command: ["streamlit", "run", "dashboard/app.py", "--server.address=0.0.0.0"]

worker:
  enabled: true
  replicas: 1
  command: ["celery", "-A", "ares.worker.tasks", "worker", "--loglevel=INFO"]

scheduler:
  enabled: true
  replicas: 1
  command: ["python", "-m", "ares.scheduler.drift_scheduler"]

migration:
  enabled: true
  command: ["alembic", "upgrade", "head"]

service:
  type: ClusterIP

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: ares.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

config:
  environment: production
  allowedOrigins: []
  otelExporterOtlpEndpoint: ""
  mlflowTrackingUri: "http://mlflow:5000"

secrets:
  existingSecret: ares-secrets
  createDemoSecret: false
  databaseUrl: ""
  redisUrl: ""
  apiKeys: ""
  apiKeyHashSecret: ""

resources:
  api:
    requests: {cpu: 100m, memory: 256Mi}
    limits: {cpu: 1000m, memory: 1Gi}
  worker:
    requests: {cpu: 100m, memory: 256Mi}
    limits: {cpu: 1000m, memory: 1Gi}
  dashboard:
    requests: {cpu: 100m, memory: 256Mi}
    limits: {cpu: 500m, memory: 512Mi}
  scheduler:
    requests: {cpu: 50m, memory: 128Mi}
    limits: {cpu: 500m, memory: 512Mi}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  fsGroup: 10001

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

serviceAccount:
  create: true
  name: ""
  annotations: {}

serviceMonitor:
  enabled: false
  interval: 30s

networkPolicy:
  enabled: true
  allowNamespaceIngress: true
