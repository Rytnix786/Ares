services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ares
      POSTGRES_PASSWORD: ares
      POSTGRES_DB: ares
    ports: ["55432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ares"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin &&
      mc mb myminio/ares-data --ignore-existing &&
      mc mb myminio/mlflow --ignore-existing &&
      tail -f /dev/null
      "

  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.eval
    command: >
      sh -c "
      mkdir -p /home/ares/mlflow &&
      chown -R 1000:1000 /home/ares/mlflow &&
      mlflow server
      --backend-store-uri sqlite:////home/ares/mlflow/mlflow.db
      --default-artifact-root s3://mlflow
      --host 0.0.0.0
      --port 5000
      "
    user: "0:0"
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_ENDPOINT_URL: http://minio:9000
    ports: ["5000:5000"]
    volumes:
      - mlflow_data:/home/ares/mlflow
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 10s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://ares:ares@db:5432/ares
      REDIS_URL: redis://redis:6379/0
      MLFLOW_TRACKING_URI: http://mlflow:5000
      AWS_ENDPOINT_URL: http://minio:9000
      ARES_API_URL: http://api:8000/api/v1
      ARES_DASHBOARD_URL: http://dashboard:8501
    ports: ["8000:8000"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://ares:ares@db:5432/ares
      REDIS_URL: redis://redis:6379/0
      MLFLOW_TRACKING_URI: http://mlflow:5000
      AWS_ENDPOINT_URL: http://minio:9000
      ARES_API_URL: http://api:8000/api/v1
      ARES_DASHBOARD_URL: http://dashboard:8501
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      ARES_API_URL: http://api:8000/api/v1
      ARES_DASHBOARD_URL: http://dashboard:8501
      DATABASE_URL: postgresql+asyncpg://ares:ares@db:5432/ares
      REDIS_URL: redis://redis:6379/0
      MLFLOW_TRACKING_URI: http://mlflow:5000
      AWS_ENDPOINT_URL: http://minio:9000
    ports: ["8501:8501"]
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  minio_data:
  mlflow_data: