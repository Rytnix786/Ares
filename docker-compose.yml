services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ares
      POSTGRES_PASSWORD: ares
      POSTGRES_DB: ares
    ports: ["55432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ares"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    env_file: .env.example
    ports: ["8000:8000"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    command: streamlit run dashboard/app.py --server.address=0.0.0.0
    env_file: .env.example
    ports: ["8501:8501"]